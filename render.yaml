# Deploy from repo root — builds frontend, runs backend
# https://github.com/Dafi-web/voice-of-voiceless-

services:
  - type: web
    name: beyond-silence
    runtime: node
    plan: free
    # `postinstall` installs frontend/backend deps; on Render it also runs vite build.
    buildCommand: npm install
    startCommand: npm run start --prefix backend
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /opt/render/project/src/backend/data
      - key: UPLOADS_DIR
        value: /opt/render/project/src/backend/data/uploads
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOW_VERCEL_PREVIEWS
        value: "true"
    disk:
      name: beyond-silence-disk
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1
